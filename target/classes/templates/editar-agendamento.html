<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cortando a Juba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>

<body>
    <header th:replace="~{fragments/header-usuario :: header-usuario}"></header>

    <main class="main-content">
        <div class="container-fluid">
            <h1>Agendar Corte</h1>
            <hr class="border-light">

            <div class="fundo-form mt-5">
                <form method="POST">
                    <input type="hidden" name="idAgendamento" th:value="${agendamento.idAgendamento}" />
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="nomeCliente" class="form-label">Nome do Cliente</label>
                            <input type="text" class="form-control" id="nomeCliente" name="nomeCliente"
                                th:value="${agendamento.nomeCliente}" required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="procedimento" class="form-label">Procedimento</label>
                            <select class="form-select" id="procedimento" name="procedimento" required>
                                <option th:each="p : ${procedimento}" th:value="${p.nomeProcedimento}" th:text="${p.nomeProcedimento}"
                                th:selected="${p.nomeProcedimento == agendamento.procedimento}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="tel" class="form-control" id="telefone" name="telefone"
                                th:value="${agendamento.telefone}" required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="data" class="form-label">Data do Corte</label>
                            <input type="date" class="form-control" id="data" name="data" th:value="${agendamento.data != null ? #temporals.format(agendamento.data, 'yyyy-MM-dd') :''}" required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="hora" class="form-label">Hora do Corte</label>
                            <input type="time" class="form-control" id="hora" name="hora" th:value="${agendamento.hora}" required />
                        </div>

                        <div class="col-md-12 mt-3">
                            <button type="submit" class="btn btn-agendar w-100">Confirmar Agendamento</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/menu.js}"></script>
</body>

</html>

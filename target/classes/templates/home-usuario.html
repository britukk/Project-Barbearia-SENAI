<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cortando a Juba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>

<body>

  <header th:replace="~{fragments/header-usuario :: header-usuario}"></header>

  <main class="main-content">
    <h1>Próximos Atendimentos</h1>
    <hr class="border-secondary">

    <div class="container-cards">
      <div class="fundo-card" th:each="agendamento : ${agendamento}">
        <div class="card-body">
          <h5 class="card-title" th:text="${agendamento.nomeCliente}"></h5>
          <h6 class="text-secondary mb-3">ID: [[${agendamento.idAgendamento}]]</h6>
          <p class="card-text"><strong>Procedimento:</strong> [[${agendamento.procedimento}]]</p>
          <p class="card-text"><strong>Telefone:</strong> [[${agendamento.telefone}]]</p>
          <p class="card-text"><strong>Data:</strong> [[${#temporals.format(agendamento.data, 'dd/MM/yyyy')}]]</p>
          <p class="card-text"><strong>Hora:</strong> [[${agendamento.hora}]]</p>
          <a th:href="@{/editarAgendamento/{id}(id=${agendamento.idAgendamento})}" class="card-link" style="margin-right: 20px;">Editar</a>
          <a th:href="@{/confirmarExclusao/{id}(id=${agendamento.idAgendamento})}" class="card-link">Excluir</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/menu.js}"></script>
</body>

</html>

<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Cortando a Juba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>
<body>

  <main class="main-content" style="margin-left: 0; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="container">
      <div class="fundo-form text-center">
        <i class="bi bi-person-circle" style="font-size: 4rem; color: #e17218;"></i>
        <h2 class="text-white mb-4">Acesso ao Sistema</h2>
        
        <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

        <form th:action="@{/login}" method="POST">
          <div class="mb-3 text-start">
            <label for="usuario" class="form-label">Usuário</label>
            <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ex: barbeiro1" required>
          </div>
          
          <div class="mb-4 text-start">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha" required>
          </div>

          <button type="submit" class="btn btn-agendar w-100">Entrar</button>
          
          <div class="mt-3">
            <a href="/" class="text-secondary text-decoration-none">Voltar para o site</a>
          </div>
        </form>
      </div>
    </div>
  </main>

</body>
</html>

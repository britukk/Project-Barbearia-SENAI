<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cortando a Juba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>

<body>
    <header th:replace="~{fragments/header-usuario :: header-usuario}"></header>

    <main class="main-content">
        <div class="container-fluid">
            <h1>Cadastrar serviço </h1>
            <hr class="border-light">

            <div class="fundo-form mt-5">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nomeProcedimento" class="form-label">Nome do serviço</label>
                            <input type="text" class="form-control" id="nomeProcedimento" name="nomeProcedimento"
                                required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="valor" class="form-label">Valor</label>
                            <input type="number" class="form-control" id="valor" name="valor" step="0.01" required />
                        </div>

                        <div class="col-md-12 mb-3">
                            <label for="descrisao" class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="descrisao" name="descrisao" required />
                        </div>

                        <div class="col-md-12 mt-3">
                            <button type="submit" class="btn btn-agendar w-100">Cadastrar serviço</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/menu.js}"></script>
</body>

</html>

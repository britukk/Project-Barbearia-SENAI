<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excluir Agendamento | Cortando a Juba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>

<body>

  <header th:replace="~{fragments/header-usuario :: header-usuario}"></header>

  <main class="main-content">
    <div class="container-fluid">
      <h1>Confirmar Exclusão</h1>
      <hr class="border-light">

      <div class="fundo-form mt-5 text-center">
        <i class="bi bi-exclamation-triangle-fill" style="font-size: 3rem; color: #e17218;"></i>
        
        <p class="form-label mt-3" style="text-transform: none;">
          Você está prestes a excluir o agendamento de: <br>
          <strong class="text-white" th:text="${agendamento.nomeCliente}">Nome do Cliente</strong>
        </p>
        
        <p class="text-secondary mb-4">Essa ação não poderá ser desfeita.</p>

        <div class="d-flex justify-content-center gap-3">
          <a class="btn btn-agendar px-5" 
             th:href="@{'/excluirAgendamento?idAgendamento=' + ${agendamento.idAgendamento}}" 
             role="button">Sim, Excluir</a>

          <a class="btn btn-outline-light px-5 d-flex align-items-center" 
             href="/home-usuario" 
             role="button">Não, Voltar</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/menu.js}"></script>
</body>

</html>

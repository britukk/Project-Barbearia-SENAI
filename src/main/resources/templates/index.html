<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cortando a Juba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style1.css}">
</head>
<body>

  <header th:replace="~{fragments/header-usuario :: header-usuario}"></header>

  <main class="main-content">
    <h1>Nossos serviços</h1>
    <hr class="border-secondary">

    <div class="container-cards">
      <div class="fundo-card" th:each="procedimento : ${procedimento}">
        <div class="card-body">
          <h5 class="card-title" th:text="${procedimento.nomeProcedimento}"></h5>
          <h6 class="text-secondary mb-3">Valor: [[${procedimento.valor}]]</h6>
          <p class="card-text"><strong>Descrição:</strong> [[${procedimento.descrisao}]]</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/menu.js}"></script>
</body>
</html>
